<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emergex — Login</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0d12;--bg2:#10131a;--bg3:#161921;--surface:#1c2030;
      --border:#252a38;--text:#e2e6f0;--muted:#7a85a0;
      --accent:#e53935;--success:#1aaa72;
      --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    }
    [data-theme="light"]{
      --bg:#f0f2f8;--bg2:#fff;--bg3:#e8ebf4;--surface:#fff;
      --border:#dde2f0;--text:#111827;--muted:#6b7280;
      --accent:#e53935;--success:#0a7a52;
    }
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;transition:background .25s,color .25s}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;pointer-events:none}
    .wrap{width:100%;max-width:400px;padding:24px;position:relative;z-index:1}
    .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
    .logo-icon{width:42px;height:42px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .logo-text{font-size:22px;font-weight:600;letter-spacing:.5px}
    .logo-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:16px}
    .card-title{font-size:18px;font-weight:600;margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
    .cred-hint{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:20px}
    .cred-hint span{color:var(--text)}
    .form-group{margin-bottom:16px}
    .form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
    .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s}
    .form-input:focus{border-color:var(--accent)}
    .form-input::placeholder{color:var(--muted)}
    .submit-btn{width:100%;background:var(--accent);border:none;border-radius:8px;padding:12px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;margin-top:8px}
    .submit-btn:hover{opacity:.88}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .alert-error{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3);color:var(--accent)}
    .alert-success{background:rgba(26,170,114,.1);border:1px solid rgba(26,170,114,.3);color:var(--success)}
    .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
    .footer-note{text-align:center;font-size:12px;color:var(--muted)}
    .footer-note a{color:var(--accent);text-decoration:none}
    .theme-toggle{position:absolute;top:20px;right:20px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:12px;cursor:pointer;font-family:var(--font)}
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🚨</div>
    <div>
      <div class="logo-text">EMERGEX</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access the emergency dashboard</div>

    <div class="cred-hint">
      Default → username: <span>admin</span> · password: <span>admin123</span>
    </div>

    <div id="alert-box" style="display:none"></div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>

    <button class="submit-btn" id="login-btn" onclick="login()">Sign In →</button>

    <hr class="divider"/>
    <div class="footer-note">
      Customer portal → <a href="/customer.html">Report an emergency</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('jwt')) {
    window.location.href = '/';
  }

  function toggleTheme(){
    const d=document.documentElement,l=d.getAttribute('data-theme')==='dark';
    d.setAttribute('data-theme',l?'light':'dark');
    document.getElementById('theme-btn').textContent=l?'🌙 Dark':'☀️ Light';
  }

  function showAlert(msg, type='error'){
    const el=document.getElementById('alert-box');
    el.style.display='flex';
    el.className='alert alert-'+type;
    el.innerHTML=(type==='error'?'⚠️ ':'✅ ')+msg;
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if(e.key === 'Enter') login();
  });

  async function login(){
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if(!username || !password){
      showAlert('Please enter username and password.');
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        // ✅ Store JWT and redirect to dashboard
        localStorage.setItem('jwt', data.token);
        localStorage.setItem('username', data.username);
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/', 500);
      } else {
        showAlert(data.error || 'Invalid username or password.');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    } catch(err) {
      showAlert('Could not connect to server. Is Spring Boot running?');
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  }
</script>
</body>
</html>
