<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emergex — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0d12;--bg2:#10131a;--bg3:#161921;--surface:#1c2030;
      --border:#252a38;--border2:#2e3549;--text:#e2e6f0;--muted:#7a85a0;
      --accent:#e53935;--success:#1aaa72;
      --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
    }
    [data-theme="light"]{
      --bg:#f0f2f8;--bg2:#fff;--bg3:#e8ebf4;--surface:#fff;
      --border:#dde2f0;--border2:#c8cfe8;--text:#111827;--muted:#6b7280;
      --accent:#e53935;--success:#0a7a52;
    }
    html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;transition:background .3s,color .3s}

    /* ── BACKGROUND ── */
    .bg-canvas{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:drift linear infinite}
    .orb-1{width:500px;height:500px;background:var(--accent);top:-120px;left:-100px;animation-duration:22s}
    .orb-2{width:400px;height:400px;background:#4a9eff;bottom:-80px;right:-80px;animation-duration:28s;animation-delay:-10s}
    .orb-3{width:280px;height:280px;background:#b06fff;top:40%;left:60%;animation-duration:18s;animation-delay:-5s}
    @keyframes drift{
      0%{transform:translate(0,0) scale(1)}
      33%{transform:translate(30px,-20px) scale(1.05)}
      66%{transform:translate(-20px,25px) scale(.95)}
      100%{transform:translate(0,0) scale(1)}
    }
    [data-theme="light"] .orb{opacity:.07}

    /* Grid overlay */
    .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:44px 44px;opacity:.25}

    /* ── LAYOUT ── */
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
    .wrap{width:100%;max-width:400px;position:relative;z-index:1;animation:slideUp .4s cubic-bezier(.34,1.2,.64,1) both}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* ── LOGO ── */
    .logo{display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:36px}
    .logo-icon{width:46px;height:46px;background:var(--accent);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(229,57,53,.35);flex-shrink:0}
    .logo-text{font-size:22px;font-weight:600;letter-spacing:.5px}
    .logo-badge{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;display:flex;align-items:center;gap:5px}
    .logo-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--success);display:inline-block;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── CARD ── */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:30px;margin-bottom:14px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
    [data-theme="light"] .card{box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .card-title{font-size:18px;font-weight:600;margin-bottom:4px}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:26px;line-height:1.5}

    /* ── FORM ── */
    .form-group{margin-bottom:15px}
    .form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
    .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(229,57,53,.12)}
    .form-input.error{border-color:var(--accent)}
    .form-input::placeholder{color:var(--muted)}

    /* ── ALERT ── */
    .alert{border-radius:9px;padding:10px 13px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px;line-height:1.5}
    .alert.show{display:flex}
    .alert-error{background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.25);color:var(--accent)}
    .alert-success{background:rgba(26,170,114,.08);border:1px solid rgba(26,170,114,.25);color:var(--success)}

    /* ── BUTTON ── */
    .submit-btn{width:100%;background:var(--accent);border:none;border-radius:9px;padding:12px;color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
    .submit-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px);box-shadow:0 4px 16px rgba(229,57,53,.3)}
    .submit-btn:active:not(:disabled){transform:translateY(0)}
    .submit-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── DIVIDER ── */
    .divider{border:none;border-top:1px solid var(--border);margin:20px 0}

    /* ── FOOTER ── */
    .footer-note{text-align:center;font-size:12px;color:var(--muted);line-height:1.7}
    .footer-note a{color:var(--accent);text-decoration:none;font-weight:500;transition:.15s}
    .footer-note a:hover{opacity:.8}

    /* ── THEME TOGGLE ── */
    .theme-btn{position:fixed;top:16px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:12px;cursor:pointer;font-family:var(--font);transition:.15s;z-index:10}
    .theme-btn:hover{background:var(--bg3)}

    /* ── MOBILE ── */
    @media(max-width:440px){
      .card{padding:24px 20px}
      .logo{margin-bottom:28px}
    }
  </style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="bg-grid"></div>

<button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🚨</div>
    <div>
      <div class="logo-text">EMERGEX</div>
      <div class="logo-badge">Admin Panel</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access the emergency dashboard</div>

    <div class="alert alert-error" id="alert-box">
      <span id="alert-icon">⚠️</span>
      <span id="alert-msg"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>

    <button class="submit-btn" id="login-btn" onclick="login()">
      <span id="btn-icon">→</span>
      <span id="btn-text">Sign In</span>
    </button>

    <div class="divider"></div>
    <div class="footer-note">
      Not an admin? <a href="/customer.html">Report an emergency →</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('jwt')) window.location.href = '/';

  function toggleTheme(){
    const d=document.documentElement,l=d.getAttribute('data-theme')==='dark';
    d.setAttribute('data-theme',l?'light':'dark');
    document.getElementById('theme-btn').textContent=l?'🌙 Dark':'☀️ Light';
  }

  function showAlert(msg, type='error'){
    const el=document.getElementById('alert-box');
    document.getElementById('alert-msg').textContent=msg;
    document.getElementById('alert-icon').textContent=type==='error'?'⚠️':'✅';
    el.className='alert alert-'+type+' show';
  }

  function hideAlert(){
    document.getElementById('alert-box').classList.remove('show');
  }

  function setLoading(loading){
    const btn=document.getElementById('login-btn');
    btn.disabled=loading;
    if(loading){
      document.getElementById('btn-icon').outerHTML='<span id="btn-icon" class="spinner"></span>';
      document.getElementById('btn-text').textContent='Signing in…';
    } else {
      document.getElementById('btn-icon').outerHTML='<span id="btn-icon">→</span>';
      document.getElementById('btn-text').textContent='Sign In';
    }
  }

  document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });

  // Clear error on input
  ['username','password'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{
      hideAlert();
      document.getElementById(id).classList.remove('error');
    });
  });

  async function login(){
    const username=document.getElementById('username').value.trim();
    const password=document.getElementById('password').value.trim();

    if(!username||!password){
      if(!username)document.getElementById('username').classList.add('error');
      if(!password)document.getElementById('password').classList.add('error');
      showAlert('Please enter your username and password.');
      return;
    }

    hideAlert();
    setLoading(true);

    try{
      const res=await fetch('/api/auth/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
      });
      const data=await res.json();

      if(res.ok&&data.token){
        localStorage.setItem('jwt',data.token);
        localStorage.setItem('username',data.username||username);
        showAlert('Login successful! Redirecting…','success');
        setTimeout(()=>window.location.href='/',600);
      } else {
        showAlert(data.error||'Invalid username or password.');
        document.getElementById('password').value='';
        document.getElementById('password').focus();
        setLoading(false);
      }
    } catch(err){
      showAlert('Could not connect to the server. Is Spring Boot running?');
      setLoading(false);
    }
  }
</script>
</body>
</html>
