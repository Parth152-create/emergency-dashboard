<!DOCTYPE html>
<html lang="en" data-theme="dark" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emergex — Admin Login</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d12; --bg2: #10131a; --bg3: #161921; --surface: #1c2030;
      --border: #252a38; --border2: #2e3549; --text: #e2e6f0; --muted: #7a85a0;
      --accent: #e53935; --success: #1aaa72;
      --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 14px;
    }

    /* Background grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .3;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text { font-size: 22px; font-weight: 600; letter-spacing: .5px; }
    .logo-sub { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 16px;
    }

    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 8px;
    }
    .submit-btn:hover { opacity: .88; }
    .submit-btn:active { transform: scale(.99); }

    .alert {
      background: rgba(229,57,53,.1);
      border: 1px solid rgba(229,57,53,.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-success {
      background: rgba(26,170,114,.1);
      border-color: rgba(26,170,114,.3);
      color: var(--success);
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .footer-note a { color: var(--accent); text-decoration: none; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .cred-hint {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 20px;
    }
    .cred-hint span { color: var(--text); }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="logo">
    <div class="logo-icon">🚨</div>
    <div>
      <div class="logo-text">EMERGEX</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access the emergency dashboard</div>

    <!-- Error alert -->
    <div th:if="${param.error}" class="alert">
      ⚠️ Invalid username or password. Please try again.
    </div>

    <!-- Logout success -->
    <div th:if="${param.logout}" class="alert alert-success">
      ✅ You have been logged out successfully.
    </div>

    <!-- Default creds hint (remove in production) -->
    <div class="cred-hint">
      Default — username: <span>admin</span> · password: <span>admin123</span>
    </div>

    <form method="POST" action="/login">

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Enter username" autocomplete="username" required autofocus/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter password" autocomplete="current-password" required/>
      </div>

      <button type="submit" class="submit-btn">Sign In →</button>
    </form>

    <hr class="divider"/>
    <div class="footer-note">
      Customer portal → <a href="/customer.html">Report an emergency</a>
    </div>
  </div>

</div>
</body>
</html>
